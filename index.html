<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>奇門遁甲 - AI問事 (九宮全資訊版)</title>
<style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f2f2f7; padding: 15px; margin: 0; padding-bottom: 120px; color: #1c1c1e; }
    h2 { font-size: 20px; color: #000; }
    .top-bar { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
    select { width: 100%; padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #c7c7cc; background: #fff; margin-top: 8px; -webkit-appearance: none; appearance: none; box-sizing: border-box; }
    .panel { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 1px 5px rgba(0,0,0,0.05); }
    
    .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e5ea; padding-bottom: 8px; margin-bottom: 12px; }
    .panel-title { font-size: 18px; font-weight: bold; color: #007aff; margin: 0; }
    .copy-tool { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #8e8e93; }
    .copy-tool select { width: auto; padding: 5px 25px 5px 10px; font-size: 13px; margin-top: 0; border-radius: 6px; background: #f2f2f7; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label.title { display: block; font-size: 15px; font-weight: bold; margin-bottom: 8px; color: #3a3a3c; }
    .grid-5, .grid-4 { display: grid; gap: 8px; }
    .grid-5 { grid-template-columns: repeat(5, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .btn-check { display: flex; align-items: center; justify-content: center; background: #f2f2f7; border: 1px solid #d1d1d6; border-radius: 6px; padding: 10px 0; font-size: 14px; color: #1c1c1e; transition: 0.2s; user-select: none; text-align: center; }
    input[type="checkbox"], input[type="radio"] { display: none; }
    input[type="checkbox"]:checked + .btn-check, input[type="radio"]:checked + .btn-check { background: #007aff; color: #fff; border-color: #007aff; font-weight: bold; }
    input[type="checkbox"]:disabled + .btn-check { opacity: 0.5; }
    .harm-group { display: flex; gap: 10px; margin-top: 8px; }
    .harm-group label { flex: 1; }
    .select-container { position: relative; }
    .select-container::after { content: "▼"; font-size: 12px; color: #8e8e93; position: absolute; right: 12px; top: 18px; pointer-events: none; }
    .panel-header .select-container::after { top: 10px; right: 8px; font-size: 10px; }
    
    textarea#previewArea { width: 100%; height: 180px; padding: 12px; font-family: monospace; font-size: 14px; border-radius: 8px; border: 1px solid #c7c7cc; background: #fafafa; color: #333; box-sizing: border-box; resize: none; margin-top: 8px; }
    
    .jiugong-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: #c7c7cc; border: 2px solid #8e8e93; border-radius: 8px; overflow: hidden; margin-top: 10px; }
    .jiugong-cell { background: #fff; min-height: 120px; padding: 6px; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; box-sizing: border-box; }
    .cell-title { font-size: 12px; font-weight: bold; color: #8e8e93; border-bottom: 1px dashed #e5e5ea; width: 100%; text-align: center; padding-bottom: 3px; margin-bottom: 5px; background: #f2f2f7; }
    .cell-content { font-size: 11px; width: 100%; text-align: left; line-height: 1.4; color: #1c1c1e; }
    .cell-god-tag { background: #e1f5fe; color: #0288d1; padding: 1px 4px; border-radius: 3px; font-size: 11px; font-weight: bold; display: inline-block; margin-bottom: 2px; border: 1px solid #b3e5fc; }

    .inner-copy-btn { width: 100%; margin-top: 12px; background: #34c759; color: #fff; padding: 10px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .inner-copy-btn:active { background: #28a745; }

    .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 15px 20px; border-top: 1px solid #e5e5ea; display: flex; gap: 15px; z-index: 100; padding-bottom: max(15px, env(safe-area-inset-bottom)); }
    .bottom-bar button { flex: 1; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; }
    .btn-clear { background: #ff3b30; color: #fff; }
    .btn-clear:active { background: #d32f2f; }
    .btn-copy { background: #34c759; color: #fff; }
    .btn-copy:active { background: #28a745; }
</style>
</head>
<body>

<div class="top-bar">
    <label style="font-weight:bold;">選擇問事主題：</label>
    <div class="select-container">
        <select id="topicSelect" onchange="renderPanels()"></select>
    </div>
</div>

<div id="panelsContainer" onchange="updatePreview()"></div>

<div class="panel">
    <label style="font-weight:bold; font-size: 16px; color: #000;">奇門九宮盤配置預覽：</label>
    <div class="jiugong-grid">
        <div class="jiugong-cell" id="cell_巽四宮(木)"><div class="cell-title">巽四宮(木)</div><div class="cell-content"></div></div>
        <div class="jiugong-cell" id="cell_離九宮(火)"><div class="cell-title">離九宮(火)</div><div class="cell-content"></div></div>
        <div class="jiugong-cell" id="cell_坤二宮(土)"><div class="cell-title">坤二宮(土)</div><div class="cell-content"></div></div>
        
        <div class="jiugong-cell" id="cell_震三宮(木)"><div class="cell-title">震三宮(木)</div><div class="cell-content"></div></div>
        <div class="jiugong-cell" id="cell_陰盤(無中)"><div class="cell-title">陰盤(無中)</div><div class="cell-content"></div></div>
        <div class="jiugong-cell" id="cell_兌七宮(金)"><div class="cell-title">兌七宮(金)</div><div class="cell-content"></div></div>
        
        <div class="jiugong-cell" id="cell_艮八宮(土)"><div class="cell-title">艮八宮(土)</div><div class="cell-content"></div></div>
        <div class="jiugong-cell" id="cell_坎一宮(水)"><div class="cell-title">坎一宮(水)</div><div class="cell-content"></div></div>
        <div class="jiugong-cell" id="cell_乾六宮(金)"><div class="cell-title">乾六宮(金)</div><div class="cell-content"></div></div>
    </div>
    <button class="inner-copy-btn" onclick="copyToClipboard()" id="innerCopyBtn">複製盤面文本</button>
</div>

<div class="panel">
    <label style="font-weight:bold; font-size: 16px; color: #000;">即時預覽文本：</label>
    <textarea id="previewArea" readonly></textarea>
</div>

<div class="bottom-bar">
    <button class="btn-clear" onclick="clearAllSelections()">重置清除</button>
    <button class="btn-copy" onclick="copyToClipboard()" id="copyBtn">複製文本</button>
</div>

<script>
const topics = {
    "一般問事 (綜合發展)": ["日干 (求測者)", "時干 (事體結局)"],
    "財運投資 (生門/戊)": ["日干 (求測者)", "時干 (投資結局)", "生門 (利潤財路)", "戊 (資本本金)"],
    "事業工作 (開門/值符)": ["日干 (求測者)", "時干 (事業結局)", "開門 (事業公司)", "值符 (直屬主管)"],
    "愛情婚姻 (乙/庚/六合)": ["日干 (求測者)", "時干 (感情結局)", "乙奇 (女方)", "庚 (男方)", "六合 (婚姻關係)"],
    "健康疾病 (芮/心/乙)": ["日干 (求測者/病人)", "時干 (疾病結局)", "天芮星 (病灶部位)", "天心星 (西醫技術)", "乙奇 (中醫療法)"],
    "求學考試 (輔/景/丁)": ["日干 (求測者/考生)", "時干 (考試結局)", "天輔星 (學校考官)", "景門 (試卷成績)", "丁奇 (錄取通知)"],
    "官非訴訟 (符/乙/開)": ["日干 (求測者)", "時干 (訴訟結局)", "值符 (原告方)", "天乙 (被告方)", "開門 (法官法院)", "驚門 (律師訴訟)"],
    "出行尋物 (綜合)": ["日干 (求測者)", "時干 (目的地/失物)", "六合 (方向/失蹤者)", "傷門 (交通車輛)"]
};

const dropdownPalaces = ["坎一宮(水)", "坤二宮(土)", "震三宮(木)", "巽四宮(木)", "乾六宮(金)", "兌七宮(金)", "艮八宮(土)", "離九宮(火)"];
const allPalaces = ["坎一宮(水)", "坤二宮(土)", "震三宮(木)", "巽四宮(木)", "陰盤(無中)", "乾六宮(金)", "兌七宮(金)", "艮八宮(土)", "離九宮(火)"];

const jiaMap = {"無": "", "子 (戊)": "戊", "戌 (己)": "己", "申 (庚)": "庚", "午 (辛)": "辛", "辰 (壬)": "壬", "寅 (癸)": "癸"};
const gods = ["值符", "騰蛇", "太陰", "六合", "白虎", "玄武", "九地", "九天"];
const tiangan = ["乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
const stars = ["天蓬星", "天芮禽星", "天沖星", "天輔星", "天心星", "天柱星", "天任星", "天英星"];
const doors = ["休門", "生門", "傷門", "杜門", "景門", "死門", "驚門", "開門"];

// 奇門天干標準排布路徑，用於動態計算暗干偏移量
const ganOrder = ["戊", "己", "庚", "辛", "壬", "癸", "丁", "丙", "乙"];

// 12長生資料庫
const changshengData = {
    "坎一宮(水)": { "甲":"沐浴", "乙":"病", "丙":"胎", "丁":"絕", "戊":"胎", "己":"絕", "庚":"死", "辛":"長生", "壬":"帝旺", "癸":"臨官" },
    "坤二宮(土)": { "甲":"墓", "乙":"衰", "丙":"病", "丁":"臨官", "戊":"病", "己":"臨官", "庚":"衰", "辛":"臨官", "壬":"墓", "癸":"養" },
    "震三宮(木)": { "甲":"帝旺", "乙":"臨官", "丙":"沐浴", "丁":"病", "戊":"沐浴", "己":"病", "庚":"胎", "辛":"絕", "壬":"死", "癸":"長生" },
    "巽四宮(木)": { "甲":"衰", "乙":"帝旺", "丙":"臨官", "丁":"死", "戊":"臨官", "己":"死", "庚":"墓", "辛":"胎", "壬":"絕", "癸":"沐浴" },
    "乾六宮(金)": { "甲":"養", "乙":"墓", "丙":"墓", "丁":"養", "戊":"墓", "己":"養", "庚":"臨官", "辛":"帝旺", "壬":"長生", "癸":"衰" },
    "兌七宮(金)": { "甲":"胎", "乙":"絕", "丙":"死", "丁":"長生", "戊":"死", "己":"長生", "庚":"帝旺", "辛":"臨官", "壬":"沐浴", "癸":"病" },
    "艮八宮(土)": { "甲":"冠帶", "乙":"養", "丙":"養", "丁":"墓", "戊":"養", "己":"墓", "庚":"墓", "辛":"養", "壬":"衰", "癸":"冠帶" },
    "離九宮(火)": { "甲":"死", "乙":"長生", "丙":"帝旺", "丁":"臨官", "戊":"帝旺", "己":"臨官", "庚":"沐浴", "辛":"病", "壬":"胎", "癸":"絕" }
};

function getChangsheng(palace, gan) {
    if (!changshengData[palace] || !gan) return "";
    return changshengData[palace][gan] || "";
}

// 【修復的核心函式】：動態計算暗干
function calculateAllAnGans() {
    let anGanResult = {};
    let shiPanel = null;
    
    // 1. 尋找「時干」面板作為運算基準
    let allPanels = document.querySelectorAll('#panelsContainer > .panel');
    allPanels.forEach(p => {
        if (p.dataset.godname && p.dataset.godname.includes("時干")) {
            shiPanel = p;
        }
    });
    
    // 如果沒有找到時干面板，就無法推算
    if (!shiPanel) return anGanResult;
    
    // 2. 抓取時干面板的「天盤首干」與「地盤首干」
    let checkedTianGans = shiPanel.querySelectorAll('.tian-gan:checked');
    let checkedDiGans = shiPanel.querySelectorAll('.di-gan:checked');
    
    // 必須天、地盤都勾選了，系統才有足夠資料計算
    if (checkedTianGans.length === 0 || checkedDiGans.length === 0) return anGanResult;
    
    let shiGan = checkedTianGans[0].value;
    let baseDiGan = checkedDiGans[0].value;
    
    let baseGanIdx = ganOrder.indexOf(baseDiGan);
    let shiGanIdx = ganOrder.indexOf(shiGan);
    if (baseGanIdx === -1 || shiGanIdx === -1) return anGanResult;
    
    // 3. 計算位移差距
    let offset = (shiGanIdx - baseGanIdx + 9) % 9;
    
    // 4. 套用到所有用神面板，推導暗干
    allPanels.forEach(p => {
        let curPalace = p.querySelector('.palace-sel').value;
        let curDiGans = p.querySelectorAll('.di-gan:checked');
        if (curDiGans.length > 0) {
            let curDiGan = curDiGans[0].value;
            let curDiGanIdx = ganOrder.indexOf(curDiGan);
            if (curDiGanIdx !== -1) {
                let targetGanIdx = (curDiGanIdx + offset) % 9;
                anGanResult[curPalace] = ganOrder[targetGanIdx];
            }
        }
    });
    
    return anGanResult;
}

window.onload = function() {
    const sel = document.getElementById("topicSelect");
    for(let t in topics) { sel.add(new Option(t, t)); }
    renderPanels();
};

function renderPanels() {
    const topic = document.getElementById("topicSelect").value;
    const container = document.getElementById("panelsContainer");
    container.innerHTML = "";
    
    const currentGods = topics[topic];
    
    currentGods.forEach((godName, idx) => {
        let p = document.createElement("div");
        p.className = "panel";
        p.id = "panel_" + idx;
        p.dataset.godname = godName;
        
        let copyOptions = `<option value="">- 複製其他同宮用神 -</option>`;
        currentGods.forEach((otherGod, oIdx) => {
            if (oIdx !== idx) {
                copyOptions += `<option value="${oIdx}">${otherGod}</option>`;
            }
        });

        let html = `
        <div class="panel-header">
            <h3 class="panel-title">用神：${godName}</h3>
            <div class="copy-tool">
                <div class="select-container">
                    <select onchange="copyPanelData(${idx}, this.value); this.value='';">
                        ${copyOptions}
                    </select>
                </div>
            </div>
        </div>`;
        
        html += `<div class="form-group"><label class="title">1. 宮位與甲藏</label>
            <div style="display:flex; gap:10px;">
                <select class="palace-sel" style="flex:1; margin-top:0;" onchange="updatePreview()">` + dropdownPalaces.map(x=>`<option value="${x}">${x}</option>`).join('') + `</select>
                <select class="jia-sel" style="flex:1; margin-top:0;" onchange="updatePreview()">` + Object.keys(jiaMap).map(x=>`<option value="${jiaMap[x]}">${x}</option>`).join('') + `</select>
            </div>
        </div>`;

        html += `<div class="form-group"><label class="title">2. 天盤八神</label><div class="grid-4">`;
        gods.forEach(g => { html += `<label><input type="radio" name="tg_${idx}" value="${g}" onclick="handleRadioClick(this)"><div class="btn-check">${g}</div></label>`; });
        html += `</div></div>`;

        html += `<div class="form-group"><label class="title">3. 天盤天干 (最多2項)</label><div class="grid-5">`;
        tiangan.forEach(t => { html += `<label><input type="checkbox" class="tian-gan" value="${t}" onchange="checkLimit(this, 'tian-gan')"><div class="btn-check">${t}</div></label>`; });
        html += `</div><div class="grid-4" style="margin-top:8px;">
            <label><input type="checkbox" class="tian-jx-1" value="擊刑" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#c0392b;">首干[擊刑]</div></label>
            <label><input type="checkbox" class="tian-rm-1" value="入墓" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#c0392b;">首干[入墓]</div></label>
            <label><input type="checkbox" class="tian-jx-2" value="擊刑" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#2980b9;">次干[擊刑]</div></label>
            <label><input type="checkbox" class="tian-rm-2" value="入墓" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#2980b9;">次干[入墓]</div></label>
        </div></div>`;

        html += `<div class="form-group"><label class="title">4. 地盤天干 (最多2項)</label><div class="grid-5">`;
        tiangan.forEach(t => { html += `<label><input type="checkbox" class="di-gan" value="${t}" onchange="checkLimit(this, 'di-gan')"><div class="btn-check">${t}</div></label>`; });
        html += `</div><div class="grid-4" style="margin-top:8px;">
            <label><input type="checkbox" class="di-jx-1" value="擊刑" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#c0392b;">首干[擊刑]</div></label>
            <label><input type="checkbox" class="di-rm-1" value="入墓" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#c0392b;">首干[入墓]</div></label>
            <label><input type="checkbox" class="di-jx-2" value="擊刑" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#2980b9;">次干[擊刑]</div></label>
            <label><input type="checkbox" class="di-rm-2" value="入墓" onchange="updatePreview()"><div class="btn-check" style="font-size:13px; color:#2980b9;">次干[入墓]</div></label>
        </div></div>`;

        html += `<div class="form-group"><label class="title">5. 九星</label><div class="grid-4">`;
        stars.forEach(s => { html += `<label><input type="radio" name="star_${idx}" value="${s}" onclick="handleRadioClick(this)"><div class="btn-check">${s.substring(0,2)}</div></label>`; });
        html += `</div></div>`;

        html += `<div class="form-group"><label class="title">6. 八門</label><div class="grid-4">`;
        doors.forEach(d => { html += `<label><input type="radio" name="door_${idx}" value="${d}" onclick="handleRadioClick(this)"><div class="btn-check">${d}</div></label>`; });
        html += `</div><div class="harm-group"><label><input type="checkbox" class="door-mp" value="門迫" onchange="updatePreview()"><div class="btn-check" style="margin-top:8px;">帶 [門迫]</div></label></div></div>`;

        html += `<div class="form-group"><label class="title">7. 地盤八神</label><div class="grid-4">`;
        gods.forEach(g => { html += `<label><input type="radio" name="dg_${idx}" value="${g}" onclick="handleRadioClick(this)"><div class="btn-check">${g}</div></label>`; });
        html += `</div></div>`;

        html += `<div class="form-group"><label class="title">8. 狀態標記</label><div class="harm-group">
            <label><input type="checkbox" class="spec-kw" value="空亡" onchange="updatePreview()"><div class="btn-check">空亡</div></label>
            <label><input type="checkbox" class="spec-mx" value="馬星" onchange="updatePreview()"><div class="btn-check">馬星</div></label>
        </div></div>`;

        p.innerHTML = html;
        container.appendChild(p);
    });
    
    updatePreview();
}

function handleRadioClick(radio) {
    if (radio.dataset.checked === "true") {
        radio.checked = false;
        radio.dataset.checked = "false";
    } else {
        const siblings = document.querySelectorAll(`input[name="${radio.name}"]`);
        siblings.forEach(r => r.dataset.checked = "false");
        
        radio.checked = true;
        radio.dataset.checked = "true";
    }
    updatePreview();
}

function copyPanelData(targetIdx, sourceIdx) {
    if (sourceIdx === "") return;
    
    const sourcePanel = document.getElementById("panel_" + sourceIdx);
    const targetPanel = document.getElementById("panel_" + targetIdx);
    
    if (!sourcePanel || !targetPanel) return;

    targetPanel.querySelector('.palace-sel').selectedIndex = sourcePanel.querySelector('.palace-sel').selectedIndex;
    targetPanel.querySelector('.jia-sel').selectedIndex = sourcePanel.querySelector('.jia-sel').selectedIndex;

    const sourceTg = sourcePanel.querySelector(`input[name="tg_${sourceIdx}"]:checked`);
    const targetTgs = targetPanel.querySelectorAll(`input[name="tg_${targetIdx}"]`);
    targetTgs.forEach(r => r.dataset.checked = "false");
    if (sourceTg) {
        let tRadio = targetPanel.querySelector(`input[name="tg_${targetIdx}"][value="${sourceTg.value}"]`);
        tRadio.checked = true;
        tRadio.dataset.checked = "true";
    } else {
        const checkedTg = targetPanel.querySelector(`input[name="tg_${targetIdx}"]:checked`);
        if (checkedTg) checkedTg.checked = false;
    }

    targetPanel.querySelectorAll('.tian-gan').forEach((cb, i) => {
        cb.checked = sourcePanel.querySelectorAll('.tian-gan')[i].checked;
    });
    
    targetPanel.querySelector('.tian-jx-1').checked = sourcePanel.querySelector('.tian-jx-1').checked;
    targetPanel.querySelector('.tian-rm-1').checked = sourcePanel.querySelector('.tian-rm-1').checked;
    targetPanel.querySelector('.tian-jx-2').checked = sourcePanel.querySelector('.tian-jx-2').checked;
    targetPanel.querySelector('.tian-rm-2').checked = sourcePanel.querySelector('.tian-rm-2').checked;

    targetPanel.querySelectorAll('.di-gan').forEach((cb, i) => {
        cb.checked = sourcePanel.querySelectorAll('.di-gan')[i].checked;
    });
    
    targetPanel.querySelector('.di-jx-1').checked = sourcePanel.querySelector('.di-jx-1').checked;
    targetPanel.querySelector('.di-rm-1').checked = sourcePanel.querySelector('.di-rm-1').checked;
    targetPanel.querySelector('.di-jx-2').checked = sourcePanel.querySelector('.di-jx-2').checked;
    targetPanel.querySelector('.di-rm-2').checked = sourcePanel.querySelector('.di-rm-2').checked;

    const sourceStar = sourcePanel.querySelector(`input[name="star_${sourceIdx}"]:checked`);
    const targetStars = targetPanel.querySelectorAll(`input[name="star_${targetIdx}"]`);
    targetStars.forEach(r => r.dataset.checked = "false");
    if (sourceStar) {
        let tRadio = targetPanel.querySelector(`input[name="star_${targetIdx}"][value="${sourceStar.value}"]`);
        tRadio.checked = true;
        tRadio.dataset.checked = "true";
    } else {
        const checkedStar = targetPanel.querySelector(`input[name="star_${targetIdx}"]:checked`);
        if (checkedStar) checkedStar.checked = false;
    }

    const sourceDoor = sourcePanel.querySelector(`input[name="door_${sourceIdx}"]:checked`);
    const targetDoors = targetPanel.querySelectorAll(`input[name="door_${targetIdx}"]`);
    targetDoors.forEach(r => r.dataset.checked = "false");
    if (sourceDoor) {
        let tRadio = targetPanel.querySelector(`input[name="door_${targetIdx}"][value="${sourceDoor.value}"]`);
        tRadio.checked = true;
        tRadio.dataset.checked = "true";
    } else {
        const checkedDoor = targetPanel.querySelector(`input[name="door_${targetIdx}"]:checked`);
        if (checkedDoor) checkedDoor.checked = false;
    }
    targetPanel.querySelector('.door-mp').checked = sourcePanel.querySelector('.door-mp').checked;

    const sourceDg = sourcePanel.querySelector(`input[name="dg_${sourceIdx}"]:checked`);
    const targetDgs = targetPanel.querySelectorAll(`input[name="dg_${targetIdx}"]`);
    targetDgs.forEach(r => r.dataset.checked = "false");
    if (sourceDg) {
        let tRadio = targetPanel.querySelector(`input[name="dg_${targetIdx}"][value="${sourceDg.value}"]`);
        tRadio.checked = true;
        tRadio.dataset.checked = "true";
    } else {
        const checkedDg = targetPanel.querySelector(`input[name="dg_${targetIdx}"]:checked`);
        if (checkedDg) checkedDg.checked = false;
    }

    targetPanel.querySelector('.spec-kw').checked = sourcePanel.querySelector('.spec-kw').checked;
    targetPanel.querySelector('.spec-mx').checked = sourcePanel.querySelector('.spec-mx').checked;

    updatePreview();
}

function checkLimit(cb, className) {
    let panel = cb.closest('.panel');
    let checked = panel.querySelectorAll(`.${className}:checked`);
    if(checked.length > 2) {
        cb.checked = false;
    }
    updatePreview();
}

function clearAllSelections() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.querySelectorAll('input[type="radio"]').forEach(rb => {
        rb.checked = false;
        rb.dataset.checked = "false";
    });
    document.querySelectorAll('.palace-sel, .jia-sel').forEach(sel => sel.selectedIndex = 0);
    updatePreview();
}

function getOutputString() {
    let output = [];
    let topicText = document.getElementById("topicSelect").value.split(" ")[0];
    output.push(`問事主題 : ${topicText}\n==============================\n`);

    // 取得當前自動算出的暗干
    let currentAnGans = calculateAllAnGans();

    document.querySelectorAll('.panel').forEach((p, idx) => {
        if(!p.dataset.godname) return;

        let lines = [];
        let curPalace = p.querySelector('.palace-sel').value;
        lines.push(`[用神 : ${p.dataset.godname}]`);
        lines.push(`宮位 : ${curPalace}`);
        
        let tGod = p.querySelector(`input[name="tg_${idx}"]:checked`);
        if(tGod) lines.push(`天盤八神 : ${tGod.value}`);

        let tGans = Array.from(p.querySelectorAll('.tian-gan:checked')).map(x=>x.value);
        let jiaVal = p.querySelector('.jia-sel').value;
        let jiaText = p.querySelector('.jia-sel').options[p.querySelector('.jia-sel').selectedIndex].text;
        let jiaStr = jiaVal ? ` (${jiaText}旬首)` : "";
        
        let tHarm1Arr = [];
        if(p.querySelector('.tian-jx-1') && p.querySelector('.tian-jx-1').checked) tHarm1Arr.push("擊刑");
        if(p.querySelector('.tian-rm-1') && p.querySelector('.tian-rm-1').checked) tHarm1Arr.push("入墓");
        let tHarm1Str = tHarm1Arr.length ? `(${tHarm1Arr.join(",")})` : "";

        let tHarm2Arr = [];
        if(p.querySelector('.tian-jx-2') && p.querySelector('.tian-jx-2').checked) tHarm2Arr.push("擊刑");
        if(p.querySelector('.tian-rm-2') && p.querySelector('.tian-rm-2').checked) tHarm2Arr.push("入墓");
        let tHarm2Str = tHarm2Arr.length ? `(${tHarm2Arr.join(",")})` : "";

        // 將 12長生 加入天盤輸出
        let finalTGans = [];
        if (tGans.length > 0) {
            let cs1 = getChangsheng(curPalace, tGans[0]);
            let cs1Str = cs1 ? `[${cs1}]` : "";
            finalTGans.push(tGans[0] + cs1Str + tHarm1Str);
            if (tGans.length > 1) {
                let cs2 = getChangsheng(curPalace, tGans[1]);
                let cs2Str = cs2 ? `[${cs2}]` : "";
                finalTGans.push(tGans[1] + cs2Str + tHarm2Str);
            }
        }
        
        if (finalTGans.length) {
            lines.push(`天盤 : ${finalTGans.join(" + ")}${jiaStr}`);
        } else if (jiaVal) {
            let csJia = getChangsheng(curPalace, jiaVal);
            let csJiaStr = csJia ? `[${csJia}]` : "";
            lines.push(`天盤甲藏 : ${jiaStr.trim()}${csJiaStr}${tHarm1Str}`);
        }

        // 自動插入暗干文字
        if (currentAnGans[curPalace]) {
            lines.push(`暗干 : ${currentAnGans[curPalace]}`);
        }

        let dGans = Array.from(p.querySelectorAll('.di-gan:checked')).map(x=>x.value);
        
        let dHarm1Arr = [];
        if(p.querySelector('.di-jx-1') && p.querySelector('.di-jx-1').checked) dHarm1Arr.push("擊刑");
        if(p.querySelector('.di-rm-1') && p.querySelector('.di-rm-1').checked) dHarm1Arr.push("入墓");
        let dHarm1Str = dHarm1Arr.length ? `(${dHarm1Arr.join(",")})` : "";

        let dHarm2Arr = [];
        if(p.querySelector('.di-jx-2') && p.querySelector('.di-jx-2').checked) dHarm2Arr.push("擊刑");
        if(p.querySelector('.di-rm-2') && p.querySelector('.di-rm-2').checked) dHarm2Arr.push("入墓");
        let dHarm2Str = dHarm2Arr.length ? `(${dHarm2Arr.join(",")})` : "";

        let finalDGans = [];
        if (dGans.length > 0) {
            let dcs1 = getChangsheng(curPalace, dGans[0]);
            let dcs1Str = dcs1 ? `[${dcs1}]` : "";
            finalDGans.push(dGans[0] + dcs1Str + dHarm1Str);
            if (dGans.length > 1) {
                let dcs2 = getChangsheng(curPalace, dGans[1]);
                let dcs2Str = dcs2 ? `[${dcs2}]` : "";
                finalDGans.push(dGans[1] + dcs2Str + dHarm2Str);
            }
        }

        if (finalDGans.length) {
            lines.push(`地盤 : ${finalDGans.join(" + ")}`);
        }

        let star = p.querySelector(`input[name="star_${idx}"]:checked`);
        if(star) lines.push(`九星 : ${star.value}`);

        let door = p.querySelector(`input[name="door_${idx}"]:checked`);
        if(door) {
            let mpStr = p.querySelector('.door-mp') && p.querySelector('.door-mp').checked ? " (門迫)" : "";
            lines.push(`八門 : ${door.value}${mpStr}`);
        }

        let dGod = p.querySelector(`input[name="dg_${idx}"]:checked`);
        if(dGod) lines.push(`地盤八神 : ${dGod.value}`);

        let specs = [];
        if(p.querySelector('.spec-kw') && p.querySelector('.spec-kw').checked) specs.push("空亡");
        if(p.querySelector('.spec-mx') && p.querySelector('.spec-mx').checked) specs.push("馬星");
        if(specs.length) lines.push(`\n${specs.join(" / ")}`);

        output.push(lines.join("\n"));
        output.push("\n--------------------\n");
    });

    return output.join("\n").trim();
}

function updatePreview() {
    const previewBox = document.getElementById("previewArea");
    if(previewBox) {
        previewBox.value = getOutputString();
    }

    allPalaces.forEach(pName => {
        const cell = document.getElementById("cell_" + pName);
        if(cell) {
            cell.querySelector('.cell-content').innerHTML = "";
        }
    });

    let currentAnGans = calculateAllAnGans();

    document.querySelectorAll('#panelsContainer > .panel').forEach((p, idx) => {
        if(!p.dataset.godname) return;
        
        const pName = p.querySelector('.palace-sel').value; 
        const cell = document.getElementById("cell_" + pName);
        
        if(cell) {
            let contentDiv = cell.querySelector('.cell-content');
            let godShort = p.dataset.godname.split(" ")[0]; 
            
            let tGod = p.querySelector(`input[name="tg_${idx}"]:checked`) ? p.querySelector(`input[name="tg_${idx}"]:checked`).value : "";
            let dGod = p.querySelector(`input[name="dg_${idx}"]:checked`) ? p.querySelector(`input[name="dg_${idx}"]:checked`).value : "";
            
            let star = p.querySelector(`input[name="star_${idx}"]:checked`) ? p.querySelector(`input[name="star_${idx}"]:checked`).value.substring(0,2) : "";
            let door = p.querySelector(`input[name="door_${idx}"]:checked`) ? p.querySelector(`input[name="door_${idx}"]:checked`).value.substring(0,2) : "";
            if (door && p.querySelector('.door-mp') && p.querySelector('.door-mp').checked) {
                door += `<span style="color:#ff3b30; font-size:10px;">(迫)</span>`;
            }

            let tGansArr = Array.from(p.querySelectorAll('.tian-gan:checked')).map(x=>x.value);
            
            let tHarm1ArrGrid = [];
            if(p.querySelector('.tian-jx-1') && p.querySelector('.tian-jx-1').checked) tHarm1ArrGrid.push("刑");
            if(p.querySelector('.tian-rm-1') && p.querySelector('.tian-rm-1').checked) tHarm1ArrGrid.push("墓");
            let tHarm1StrGrid = tHarm1ArrGrid.length ? `(${tHarm1ArrGrid.join(".")})` : "";

            let tHarm2ArrGrid = [];
            if(p.querySelector('.tian-jx-2') && p.querySelector('.tian-jx-2').checked) tHarm2ArrGrid.push("刑");
            if(p.querySelector('.tian-rm-2') && p.querySelector('.tian-rm-2').checked) tHarm2ArrGrid.push("墓");
            let tHarm2StrGrid = tHarm2ArrGrid.length ? `(${tHarm2ArrGrid.join(".")})` : "";
            
            let tGansDisplay = [];
            if(tGansArr.length > 0) {
                let cs1 = getChangsheng(pName, tGansArr[0]);
                let cs1Str = cs1 ? `.${cs1.substring(0,1)}` : "";
                tGansDisplay.push(tGansArr[0] + cs1Str + tHarm1StrGrid);
                if(tGansArr.length > 1) {
                    let cs2 = getChangsheng(pName, tGansArr[1]);
                    let cs2Str = cs2 ? `.${cs2.substring(0,1)}` : "";
                    tGansDisplay.push(tGansArr[1] + cs2Str + tHarm2StrGrid);
                }
            }
            let tGansStr = tGansDisplay.join("+");

            let jiaVal = p.querySelector('.jia-sel').value;
            if(!tGansStr && jiaVal) {
                let jiaText = p.querySelector('.jia-sel').options[p.querySelector('.jia-sel').selectedIndex].text.split(" ")[0];
                let csJia = getChangsheng(pName, jiaVal);
                let csJiaStr = csJia ? `.${csJia.substring(0,1)}` : "";
                tGansStr = `首:${jiaText}${csJiaStr}${tHarm1StrGrid}`;
            }

            let dGansArr = Array.from(p.querySelectorAll('.di-gan:checked')).map(x=>x.value);
            
            let dHarm1ArrGrid = [];
            if(p.querySelector('.di-jx-1') && p.querySelector('.di-jx-1').checked) dHarm1ArrGrid.push("刑");
            if(p.querySelector('.di-rm-1') && p.querySelector('.di-rm-1').checked) dHarm1ArrGrid.push("墓");
            let dHarm1StrGrid = dHarm1ArrGrid.length ? `(${dHarm1ArrGrid.join(".")})` : "";

            let dHarm2ArrGrid = [];
            if(p.querySelector('.di-jx-2') && p.querySelector('.di-jx-2').checked) dHarm2ArrGrid.push("刑");
            if(p.querySelector('.di-rm-2') && p.querySelector('.di-rm-2').checked) dHarm2ArrGrid.push("墓");
            let dHarm2StrGrid = dHarm2ArrGrid.length ? `(${dHarm2ArrGrid.join(".")})` : "";
            
            let dGansDisplay = [];
            if(dGansArr.length > 0) {
                let dcs1 = getChangsheng(pName, dGansArr[0]);
                let dcs1Str = dcs1 ? `.${dcs1.substring(0,1)}` : "";
                dGansDisplay.push(dGansArr[0] + dcs1Str + dHarm1StrGrid);
                if(dGansArr.length > 1) {
                    let dcs2 = getChangsheng(pName, dGansArr[1]);
                    let dcs2Str = dcs2 ? `.${dcs2.substring(0,1)}` : "";
                    dGansDisplay.push(dGansArr[1] + dcs2Str + dHarm2StrGrid);
                }
            }
            let dGansStr = dGansDisplay.join("+");

            // 九宮格同步顯示暗干
            let anGanStr = currentAnGans[pName] ? `<span style="color:#007aff; font-weight:bold;">(${currentAnGans[pName]})</span>` : "";

            // 完全修正上一版導致當機的錯字（由 ${span 改為 <span）
            let gansDisplay = "";
            if (tGansStr || dGansStr) {
                gansDisplay = `<span style="color:#ff3b30; font-weight:bold;">${tGansStr || '-'}</span>/<span style="color:#8e8e93;">${dGansStr || '-'}</span> ${anGanStr}`;
            } else if (anGanStr) {
                gansDisplay = `暗:${anGanStr}`;
            }

            let specArr = [];
            if(p.querySelector('.spec-kw') && p.querySelector('.spec-kw').checked) specArr.push("空");
            if(p.querySelector('.spec-mx') && p.querySelector('.spec-mx').checked) specArr.push("馬");
            let specStr = specArr.length ? `[${specArr.join(".")}]` : "";

            let infoStr = `
            <div style="margin-bottom:8px; border-left:3px solid #007aff; padding-left:5px; padding-bottom:2px; border-bottom:1px solid #f2f2f7;">
                <span class="cell-god-tag">${godShort}${specStr}</span><br>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:2px; font-size:11px;">
                    <div>神: <span style="color:#ff9500; font-weight:bold;">${tGod || '-'}</span></div>
                    <div>地神: <span style="color:#8e8e93;">${dGod || '-'}</span></div>
                    <div>星: <span>${star || '-'}</span></div>
                    <div>門: <span style="color:#34c759; font-weight:bold;">${door || '-'}</span></div>
                </div>
                <div style="margin-top:2px;">干: ${gansDisplay}</div>
            </div>`;
            
            contentDiv.innerHTML += infoStr;
        }
    });
}

function copyToClipboard() {
    let finalStr = getOutputString();
    
    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(finalStr).then(() => {
            showSuccessState();
        }).catch(err => {
            fallbackCopy(finalStr);
        });
    } else {
        fallbackCopy(finalStr);
    }
}

function fallbackCopy(text) {
    let tempArea = document.createElement("textarea");
    tempArea.value = text;
    tempArea.style.position = "absolute";
    tempArea.style.left = "-9999px";
    document.body.appendChild(tempArea);
    tempArea.select();
    try {
        document.execCommand("copy");
        showSuccessState();
    } catch (err) {
        alert("複製失敗，請在預覽區手動全選複製。");
    }
    document.body.removeChild(tempArea);
}

function showSuccessState() {
    let btn = document.getElementById("copyBtn");
    let innerBtn = document.getElementById("innerCopyBtn");
    
    btn.innerText = "✅ 已複製！";
    btn.style.background = "#007aff";
    if(innerBtn) {
        innerBtn.innerText = "✅ 已複製盤面文本！";
        innerBtn.style.background = "#007aff";
    }
    
    setTimeout(() => { 
        btn.innerText = "複製文本"; 
        btn.style.background = "#34c759";
        if(innerBtn) {
            innerBtn.innerText = "複製盤面文本";
            innerBtn.style.background = "#34c759";
        }
    }, 2000);
}
